services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: saasia-api:latest
    container_name: saasia-api
    restart: unless-stopped
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-min-32-chars-long!!}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4321,http://localhost:8086}
      DATABASE_PATH: /data/leads.db
      NODE_ENV: development
    volumes:
      - api-data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api/v1}
    image: saasia:latest
    container_name: saasia
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-8086}:80"

volumes:
  api-data:
